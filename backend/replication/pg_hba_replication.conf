#!/bin/bash
# =============================================================
# pg_hba_replication.conf
# Script thêm rule cho phép replicator kết nối vào pg_hba.conf
# Chạy tự động qua docker-entrypoint-initdb.d
# =============================================================

# Thêm rule replication vào pg_hba.conf
echo "" >> "$PGDATA/pg_hba.conf"
echo "# === Streaming Replication ===" >> "$PGDATA/pg_hba.conf"
echo "host  replication  replicator  0.0.0.0/0  md5" >> "$PGDATA/pg_hba.conf"
echo "host  replication  replicator  ::1/128    md5" >> "$PGDATA/pg_hba.conf"
echo "host  all          gitmini_user  0.0.0.0/0  md5" >> "$PGDATA/pg_hba.conf"

echo "[MASTER] pg_hba.conf updated for replication."

# Reload để áp dụng
pg_ctl reload -D "$PGDATA" || true
