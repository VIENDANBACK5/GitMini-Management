version: '3.8'

services:
  # --- Database Service ---
  db:
    image: postgres:12.15
    container_name: gitmini_db_container
    environment:
      POSTGRES_USER: gitmini_user
      POSTGRES_PASSWORD: gitmini_password
      POSTGRES_DB: gitmini_db
    ports:
      - "5435:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      # Tự động chạy tất cả các script SQL khi khởi tạo lần đầu
      - ./sql:/docker-entrypoint-initdb.d
    restart: always

  # --- Backend Service ---
  app:
    build: ./backend
    container_name: gitmini_app_container
    environment:
      # Kết nối tới container 'db' thay vì localhost
      DATABASE_URL: postgresql://gitmini_user:gitmini_password@db:5432/gitmini_db
    ports:
      - "8099:8000"
    volumes:
      - ./data/repos:/home/chung/lab/CSDL/data/repos
      - ./backend/gitserver:/app/gitserver
      - ./backend/scripts:/app/scripts
      - ./frontend:/app/frontend
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
